# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# Sample workflow for building and deploying a Jekyll site to GitHub Pages
name: Deploy Jekyll site to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["master"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      # Install Ruby for self-hosted runners if not already available
      - name: Install Ruby for self-hosted runners
        # Only run on self-hosted runners (GitHub-hosted runners already have Ruby)
        if: ${{ runner.environment == 'self-hosted' }}
        run: |
          RUBY_VERSION="3.3.5"
          RUBY_PATH="/opt/hostedtoolcache/Ruby/${RUBY_VERSION}/x64"
          
          # Check if Ruby is already installed and marked as complete
          if [ ! -f "${RUBY_PATH}.complete" ]; then
            echo "Ruby ${RUBY_VERSION} not found in tool cache, installing..."
            
            # Install ruby-build if not available
            if ! command -v ruby-build &> /dev/null; then
              echo "Installing ruby-build..."
              sudo apt-get update
              sudo apt-get install -y git build-essential libssl-dev libreadline-dev zlib1g-dev
              git clone https://github.com/rbenv/ruby-build.git /tmp/ruby-build
              sudo /tmp/ruby-build/install.sh
            fi
            
            # Create directory if it doesn't exist
            sudo mkdir -p "$(dirname "${RUBY_PATH}")"
            
            # Install Ruby using ruby-build
            echo "Installing Ruby ${RUBY_VERSION} to ${RUBY_PATH}..."
            sudo ruby-build "${RUBY_VERSION}" "${RUBY_PATH}"
            
            # Mark installation as complete
            sudo touch "${RUBY_PATH}.complete"
            echo "Ruby ${RUBY_VERSION} installation completed"
          else
            echo "Ruby ${RUBY_VERSION} already installed in tool cache"
          fi
        shell: bash
        
      - name: Setup Ruby
        uses: ruby/setup-ruby@0481980f17b760ef6bca5e8c55809102a0af1e5a # v1.263.0
        with:
          ruby-version: '3.3' # Updated to a more recent supported version
          bundler-cache: true # runs 'bundle install' and caches installed gems automatically
          cache-version: 0 # Increment this number if you need to re-download cached gems
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
      - name: Build with Jekyll
        # Outputs to the './_site' directory by default
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production
      - name: Upload artifact
        # Automatically uploads an artifact from the './_site' directory by default
        uses: actions/upload-pages-artifact@v3

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
